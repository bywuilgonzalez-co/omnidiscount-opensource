name: Build Release

on:
  release:
    types: [published]

jobs:
  build:
    name: Build & Attach Plugin ZIP
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build distributable ZIP
        env:
          DRW_UPDATER_GH_TOKEN: ${{ secrets.DRW_UPDATER_GH_TOKEN }}
        run: |
          SLUG="discount-rules-woo"
          VERSION="${{ github.event.release.tag_name }}"
          STAGE="/tmp/${SLUG}"

          mkdir -p "${STAGE}"
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.claude/' \
            --exclude='.serena/' \
            --exclude='.agents/' \
            --exclude='.codex/' \
            --exclude='.cursor/' \
            --exclude='.gemini/' \
            --exclude='.kiro/' \
            --exclude='.opencode/' \
            --exclude='.pi/' \
            --exclude='.qoder/' \
            --exclude='.rovodev/' \
            --exclude='.trae/' \
            --exclude='.trae-cn/' \
            --exclude='.phpcsignore' \
            --exclude='DESIGN.md' \
            --exclude='PRODUCT.md' \
            --exclude='docs/' \
            --exclude='scratch/' \
            --exclude='tests/' \
            --exclude='node_modules/' \
            --exclude='vendor/' \
            ./ "${STAGE}/"

          # Base64-encode the token before embedding it in the generated PHP file.
          # This keeps the interpolated value restricted to [A-Za-z0-9+/=], so a
          # token containing a quote (or any other PHP-string-breaking character)
          # can never break out of the single-quoted string literal below.
          DRW_GITHUB_TOKEN_B64="$(printf '%s' "${DRW_UPDATER_GH_TOKEN}" | base64 | tr -d '\n')"

          mkdir -p "${STAGE}/src/Config"
          cat > "${STAGE}/src/Config/github-token.php" <<PHPEOF
          <?php
          /**
           * Generated by .github/workflows/build-release.yml at release-build time.
           * Never committed to version control -- see .gitignore.
           */

          if (!defined('ABSPATH')) {
              exit;
          }

          define('DRW_GITHUB_TOKEN', base64_decode('${DRW_GITHUB_TOKEN_B64}'));
          PHPEOF

          cd /tmp
          zip -r "${SLUG}-${VERSION}.zip" "${SLUG}/"
          echo "ZIP=/tmp/${SLUG}-${VERSION}.zip" >> "$GITHUB_ENV"

      - name: Attach ZIP to GitHub Release
        run: gh release upload "${{ github.event.release.tag_name }}" "${{ env.ZIP }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
