name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: PHP ${{ matrix.php }} – WordPress latest
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.2']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, zip
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHP syntax check
        run: find src/ -name "*.php" -exec php -l {} \;

      - name: Run PHPCS (if available)
        run: vendor/bin/phpcs --standard=WordPress-Extra --ignore=vendor/ src/ || true
        if: hashFiles('vendor/bin/phpcs') != ''
